<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie AI Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .chat-container { max-width: 700px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #response-area { min-height: 100px; padding: 15px; background: #f1f3f5; border-radius: 10px; margin-top: 20px; display: none; }
        .spinner-border { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="chat-container">
        <h2 class="text-center mb-4"> Movie AI Assistant</h2>
        <p class="text-muted text-center">Ask me about movies in our Weaviate database!</p>

        <div class="input-group mb-3">
            <input type="text" id="user-question" class="form-control" placeholder="What is Inception about?" aria-label="Question">
            <button class="btn btn-primary" type="button" id="send-btn">Ask AI</button>
        </div>

        <div class="text-center">
            <div class="spinner-border text-primary" role="status" id="loader">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <div id="response-area">
            <strong>AI Response:</strong>
            <p id="answer-text" class="mt-2"></p>
        </div>
    </div>
</div>

<script>
    document.getElementById('send-btn').addEventListener('click', async () => {
        const question = document.getElementById('user-question').value;
        const loader = document.getElementById('loader');
        const responseArea = document.getElementById('response-area');
        const answerText = document.getElementById('answer-text');

        if (!question) return alert("Please enter a question!");

        // UI State
        loader.style.display = 'inline-block';
        responseArea.style.display = 'none';

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });
            const data = await response.json();

            answerText.innerText = data.answer;
            responseArea.style.display = 'block';
        } catch (error) {
            alert("Error connecting to server.");
        } finally {
            loader.style.display = 'none';
        }
    });
</script>

</body>
</html>
